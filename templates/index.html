<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>JJK Domain System</title>
</head>
<body>
    <div id="domain-overlay"></div>

    <div class="container">
        <h1 id="status-text">SCANNING FOR CURSED ENERGY...</h1>
        <div class="video-box">
            <img src="{{ url_for('video_feed') }}">
        </div>
    </div>

    <script>
        const overlay = document.getElementById('domain-overlay');
        const statusText = document.getElementById('status-text');

        async function updateStatus() {
    try {
        const response = await fetch('/get_status');
        const data = await response.json();
        
        // Clean the status text for display
        statusText.innerText = data.status.toUpperCase();
        
        // IMPORTANT: Match these to your classes.npy labels!
        overlay.className = ''; // Reset CSS
        
        if (data.status === "gojo") { // Check if it's lowercase 'gojo'
            overlay.classList.add('void-active');
        } else if (data.status === "sukuna") { // Check if it's lowercase 'sukuna'
            overlay.classList.add('shrine-active');
        }
    } catch (e) { console.log("Connection lost..."); }
}

        setInterval(updateStatus, 100); // Check 10 times per second
    </script>
</body>
</html>
